name: Build Flutter APK

# 允许手动触发运行
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 下载你的源代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Java 环境 (Android 编译必需)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 安装 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 如果项目有指定版本，可以在这里填写，默认用最新的稳定版
          cache: true

      # 4. 获取项目依赖库
      - name: Install dependencies
        run: flutter pub get

      # 5. 编译 Release 版本的 APK
      - name: Build APK
      - run: flutter build apk --release

      # 6. 把编译好的 APK 文件上传到 GitHub 结果页
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
