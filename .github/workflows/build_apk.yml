name: Build Flutter APK

# 允许在 GitHub 页面上手动点击运行
on:
  workflow_dispatch:

jobs:
  build:
    # 使用最新的 Ubuntu 环境
    runs-on: ubuntu-latest

    steps:
      # 1. 核心步骤：把你的源代码下载到编译服务器上
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Java 环境 (安卓编译必须要这个)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 安装 Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4. 下载项目需要的各种插件和依赖库
      - name: Install dependencies
        run: flutter pub get

      # 5. 开始正式编译 Release 版本的 APK
      - name: Build APK
        run: flutter build apk --release

      # 6. 把编译出来的 APK 文件打包，让你能在 GitHub 页面直接下载
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
